<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Korahey Editor | Document Editor</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --apple-blue: #0071e3;
            --text-main: #1d1d1f;
            --bg-canvas: #e8ecf0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg-canvas);
            color: var(--text-main);
            overflow: hidden;
            min-height: 100vh;
        }

        /* Top Bar */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            height: 48px;
        }

        .editor-brand {
            font-weight: 800;
            font-size: 1rem;
            background: linear-gradient(135deg, #1d1d1f 0%, var(--apple-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        /* Sidebar Layout */
        .left-panel {
            position: fixed;
            left: 0;
            top: 48px;
            bottom: 44px;
            width: 300px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            z-index: 1001;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .left-panel.collapsed { transform: translateX(-100%); }

        /* The Smart Toggle Button */
        .panel-toggle-btn {
            position: fixed;
            left: 265px; 
            top: 66px;
            width: 28px;
            height: 28px;
            background: #fff;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 1100;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .panel-toggle-btn.sidebar-closed { left: 10px; }

        .sidebar-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            flex: 1;
        }

        .panel-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            color: #86868b;
            letter-spacing: 1.2px;
        }

        /* Canvas Area - The container for alignment */
        .canvas-center {
            position: absolute;
            top: 48px;
            left: 300px;
            right: 0;
            bottom: 44px;
            overflow-y: auto;
            padding: 40px 40px 150px 40px;
            scroll-behavior: smooth;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center; /* This keeps the paper centered in the workspace */
        }

        .canvas-center.expanded { left: 0; }

        /* A4 Paper */
        .paper-page {
            background: white;
            width: 210mm;
            min-width: 210mm;
            height: 297mm;
            margin: 80px 0 40px 0; /* Top margin provides space for the island */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 20mm 25mm;
            position: relative;
        }

        .paper-page-content { outline: none; font-family: 'Times New Roman', serif; font-size: 12pt; line-height: 1.6; }

        /* Dynamic Island - ALIGNED WITH PAPER */
        .dynamic-island {
            position: fixed;
            top: 60px;
            /* Aligns the island center with the paper center by using the same transition as the canvas */
            left: calc(50% + 150px); 
            transform: translateX(-50%);
            background: #ffffff;
            border-radius: 50px;
            padding: 8px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            z-index: 999;
            display: flex;
            gap: 15px;
            align-items: center;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dynamic-island.full-width {
            left: 50%; 
        }

        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 44px;
            background: #fff;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="editor-brand">KORAHEY EDITOR</div>
        <button style="background:var(--apple-blue); color:white; border:none; padding:6px 15px; border-radius:6px; cursor:pointer;">Save</button>
    </div>

    <div class="dynamic-island" id="island">
        <button style="border:none; background:none; cursor:pointer;"><i class="fas fa-bold"></i></button>
        <button style="border:none; background:none; cursor:pointer;"><i class="fas fa-italic"></i></button>
        <div style="width:1px; height:20px; background:#ddd;"></div>
        <button style="border:none; background:none; cursor:pointer;"><i class="fas fa-image"></i></button>
    </div>

    <div class="panel-toggle-btn" id="toggleBtn" onclick="toggleSidebar()">
        <i class="fas fa-chevron-left" id="toggleIcon"></i>
    </div>

    <div class="left-panel" id="sidebar">
        <div class="sidebar-content">
            <div class="panel-title">Pages</div>
            <div style="border: 1px solid #ddd; border-radius: 8px; padding: 10px; cursor:pointer;">
                <div style="background:#f9f9f9; aspect-ratio: 210/297; border: 1px solid #eee;"></div>
                <p style="font-size:10px; text-align:center; margin-top:5px;">Page 1</p>
            </div>
        </div>
    </div>

    <div class="canvas-center" id="canvas">
        <div class="paper-page">
            <div class="paper-page-content" contenteditable="true">
                <h1 style="text-align: center;">KORAHEY ACADEMY</h1>
                <p style="text-align: center; font-style: italic;">Passion for Success</p>
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
                <p>The Dynamic Island is now perfectly aligned with the paper. Both will move smoothly together whenever you open or close the sidebar!</p>
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <span>Page 1 of 1</span>
        <span>0 words</span>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const canvas = document.getElementById('canvas');
            const island = document.getElementById('island');
            const toggleBtn = document.getElementById('toggleBtn');
            const icon = document.getElementById('toggleIcon');
            
            sidebar.classList.toggle('collapsed');
            canvas.classList.toggle('expanded');
            island.classList.toggle('full-width');
            toggleBtn.classList.toggle('sidebar-closed');
            
            if(sidebar.classList.contains('collapsed')) {
                icon.className = 'fas fa-chevron-right';
            } else {
                icon.className = 'fas fa-chevron-left';
            }
        }
    </script>
</body>
</html>
