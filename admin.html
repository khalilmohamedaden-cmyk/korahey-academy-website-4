<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korahey Admin | Dashboard</title>
    <style>
        :root {
            --apple-blue: #0071e3;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #1d1d1f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: #fff;
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 🌊 LIVE GRADIENT & LIQUID GLASS BACKGROUND */
        .glass-header {
            padding: 160px 5% 80px;
            text-align: center;
            background: linear-gradient(-45deg, #ffffff, #eef8ff, #ffffff, #c2e4ff);
            background-size: 400% 400%;
            animation: liveGradient 12s ease infinite;
            border-radius: 0 0 80px 80px;
            position: relative;
        }

        @keyframes liveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 🏝️ LIQUID GLASS DYNAMIC ISLAND */
        .dynamic-island {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(40px) saturate(200%);
            border-radius: 100px;
            padding: 12px 30px;
            display: flex;
            align-items: center;
            gap: 35px;
            z-index: 2000;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
        }

        .island-link svg { width: 22px; height: 22px; stroke: #000; fill: none; stroke-width: 2.2; transition: 0.3s; }
        .island-link:hover { transform: scale(1.2); }

        /* 🌈 GRADIENT HELLO */
        .hello-text {
            font-size: 5.5rem;
            font-weight: 800;
            letter-spacing: -4px;
            margin-bottom: 40px;
            background: linear-gradient(to right, #1d1d1f 30%, var(--apple-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 🔍 SEARCH BAR */
        .search-container {
            max-width: 700px;
            margin: 0 auto 60px;
        }

        .search-container input {
            width: 100%;
            padding: 22px 40px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            font-size: 1.1rem;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            outline: none;
            text-align: center;
        }

        /* 🔘 CATEGORY ICONS (Useful Words, No Emojis) */
        .category-grid {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
        }

        .cat-item { display: flex; flex-direction: column; align-items: center; gap: 12px; cursor: pointer; }
        
        .cat-icon {
            width: 65px; height: 65px; border-radius: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--glass-border);
            transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .cat-icon svg { width: 28px; height: 28px; stroke: #000; fill: none; stroke-width: 2; }
        .cat-item span { font-size: 12px; font-weight: 600; color: #555; }
        .cat-item:hover .cat-icon { transform: translateY(-8px); background: #fff; border-color: var(--apple-blue); }

        /* 🛠️ FILTER BAR (From Screenshot) */
        .filter-container {
            max-width: 1400px;
            margin: 40px auto 20px;
            padding: 0 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .filter-pills { display: flex; gap: 12px; align-items: center; }

        .pill {
            padding: 10px 22px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 🖼️ RECENT WORK GRID */
        .recent-section { max-width: 1400px; margin: 0 auto; padding: 0 8% 100px; }
        .recent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .liquid-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            transition: 0.4s;
            cursor: pointer;
        }

        .liquid-card:hover { transform: translateY(-10px) scale(1.02); background: rgba(255,255,255,0.8); }
        .card-preview { height: 180px; background: rgba(0,0,0,0.03); }
        .card-body { padding: 20px; }
        .card-body h4 { font-size: 1rem; margin-bottom: 5px; }
        .card-body p { font-size: 0.8rem; color: #86868b; }

    </style>
</head>
<body>

    <nav class="dynamic-island">
        <a href="applications.html" class="island-link">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        </a>
        <a href="index.html" class="island-link">
            <svg viewBox="0 0 24 24" style="stroke-width: 2.5;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-7H9v7H5a2 2 0 0 1-2-2z"/></svg>
        </a>
        <a href="#" class="island-link">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </a>
        <a href="#" class="island-link">
            <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </a>
    </nav>

    <header class="glass-header">
        <h1 class="hello-text">Hello, Khalil</h1>

        <div class="search-container">
            <input type="text" placeholder="Search school documents or records">
        </div>

        <div class="category-grid">
            <div class="cat-item">
                <div class="cat-icon">
                    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                </div>
                <span>Documents</span>
            </div>
            <div class="cat-item">
                <div class="cat-icon">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
                </div>
                <span>Sheets</span>
            </div>
            <div class="cat-item">
                <div class="cat-icon">
                    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
                </div>
                <span>Schedules</span>
            </div>
        </div>
    </header>

    <div class="filter-container">
        <h3 style="font-weight: 700;">Recents</h3>
        <div class="filter-pills">
            <button class="pill">Owner <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 9l6 6 6-6"/></svg></button>
            <button class="pill">Any type <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 9l6 6 6-6"/></svg></button>
            <div style="margin-left: 10px; opacity: 0.5;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 16V4M7 4L3 8M7 4L11 8M17 8v12M17 20l-4-4M17 20l4-4"/></svg>
            </div>
        </div>
    </div>

    <main class="recent-section">
        <div class="recent-grid">
            <div class="liquid-card">
                <div class="card-preview"></div>
                <div class="card-body">
                    <h4>Student Attendance Record</h4>
                    <p>Modified 22 days ago</p>
                </div>
            </div>
            <div class="liquid-card">
                <div class="card-preview"></div>
                <div class="card-body">
                    <h4>Class Noise Tracker</h4>
                    <p>Modified 23 days ago</p>
                </div>
            </div>
            <div class="liquid-card">
                <div class="card-preview"></div>
                <div class="card-body">
                    <h4>Weekly Schedule</h4>
                    <p>Modified 23 days ago</p>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
