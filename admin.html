<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korahey Admin | Live Dashboard</title>
    <style>
        :root {
            --apple-blue: #0071e3;
            --island-glass: rgba(255, 255, 255, 0.45);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; background: #fff; color: #1d1d1f; overflow-x: hidden; }

        /* 🏝️ PURE ICON DYNAMIC ISLAND */
        .dynamic-island {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--island-glass);
            backdrop-filter: blur(30px) saturate(180%);
            border-radius: 60px;
            padding: 10px 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            z-index: 2000;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .island-link {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #1d1d1f;
            transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .island-link:hover { transform: scale(1.25); opacity: 0.7; }

        /* Icon Sizing */
        .island-link svg { width: 22px; height: 22px; stroke: #1d1d1f; fill: none; stroke-width: 2.2; }

        /* Dead Center Highlight for Home */
        .home-center svg { width: 26px; height: 26px; stroke-width: 2.5; }

        /* 🌊 LIVE GRADIENT HEADER */
        .header-bg {
            padding: 150px 5% 80px;
            text-align: center;
            background: linear-gradient(-45deg, #ffffff, #eef8ff, #ffffff, #c2e4ff);
            background-size: 400% 400%;
            animation: liveGradient 12s ease infinite;
            border-radius: 0 0 80px 80px;
        }

        @keyframes liveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 🌈 GRADIENT HELLO TEXT */
        .hello-text {
            font-size: clamp(3rem, 10vw, 5.5rem);
            font-weight: 800;
            letter-spacing: -4px;
            margin-bottom: 45px;
            background: linear-gradient(to right, #1d1d1f 30%, var(--apple-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
        }

        /* 🔍 ULTRA-SOFT SEARCH BAR */
        .search-container {
            max-width: 650px;
            margin: 0 auto;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 22px 30px 22px 30px;
            border-radius: 24px;
            border: 1px solid rgba(0,0,0,0.06);
            font-size: 1.1rem;
            background: #fff;
            box-shadow: 0 12px 40px rgba(0,0,0,0.04);
            outline: none;
            text-align: center; /* Center the placeholder for Apple look */
            transition: 0.3s;
        }

        .search-container input:focus {
            box-shadow: 0 15px 50px rgba(0, 113, 227, 0.12);
            transform: scale(1.01);
        }
    </style>
</head>
<body>

    <nav class="dynamic-island">
        <a href="applications.html" class="island-link" title="Applications">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        </a>

        <a href="index.html" class="island-link home-center" title="Home">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-7H9v7H5a2 2 0 0 1-2-2z"/></svg>
        </a>

        <a href="#" class="island-link" title="Add New">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </a>

        <a href="#" class="island-link" title="Notifications">
            <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </a>
    </nav>

    <header class="header-bg">
        <h1 class="hello-text">Hello, Khalil</h1>

        <div class="search-container">
            <input type="text" placeholder="Search resources or records">
        </div>
    </header>

    </body>
</html>
