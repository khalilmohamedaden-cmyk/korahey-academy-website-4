<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korahey Admin | Live Dashboard</title>
    <style>
        :root {
            --apple-blue: #0071e3;
            --text-main: #1d1d1f;
            --island-glass: rgba(255, 255, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
            background: #fff;
        }

        /* 🌊 LIVE GRADIENT BACKGROUND */
        .header-bg {
            padding: 120px 5% 60px;
            text-align: center;
            position: relative;
            background: linear-gradient(-45deg, #ffffff, #e0f2ff, #ffffff, #80c4ff);
            background-size: 400% 400%;
            animation: liveGradient 15s ease infinite;
            border-radius: 0 0 60px 60px;
        }

        @keyframes liveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 🏝️ TRANSPARENT DYNAMIC ISLAND */
        .dynamic-island {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--island-glass);
            backdrop-filter: blur(25px) saturate(180%);
            border-radius: 50px;
            padding: 10px 30px;
            display: flex;
            align-items: center;
            gap: 25px;
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .island-link {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #333;
            font-size: 13px;
            font-weight: 600;
        }

        .island-link svg { width: 18px; height: 18px; stroke: #333; fill: none; stroke-width: 2.5; }

        /* 🌈 GRADIENT HELLO TEXT */
        .hello-text {
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: -3px;
            margin-bottom: 40px;
            background: linear-gradient(to right, #1d1d1f 20%, var(--apple-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 🔍 SOFT SEARCH BAR */
        .search-container {
            max-width: 700px;
            margin: 0 auto 50px;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 20px 30px 20px 65px;
            border-radius: 20px;
            border: 1px solid rgba(0,0,0,0.08);
            font-size: 1.1rem;
            background: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            outline: none;
        }

        /* 🔘 CATEGORY SCROLLER */
        .category-scroller {
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .cat-item { display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; }
        .cat-circle {
            width: 60px; height: 60px; border-radius: 50%;
            background: #fff; display: flex; align-items: center; justify-content: center;
            font-size: 24px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        .cat-item:hover .cat-circle { transform: translateY(-5px); border: 2px solid var(--apple-blue); }

        /* 🛠️ FILTER BAR (From your screenshot) */
        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 8% 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .filter-group { display: flex; align-items: center; gap: 15px; }

        .pill-btn {
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid #e0e0e0;
            background: #fff;
            font-size: 0.9rem;
            color: #333;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }
        .pill-btn:hover { background: #f5f5f7; }

        .icon-btn { cursor: pointer; opacity: 0.6; transition: 0.2s; }
        .icon-btn:hover { opacity: 1; }

        /* 🖼️ PROJECT CARDS */
        .recents-section { padding: 0 8% 100px; max-width: 1400px; margin: 0 auto; }
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .rect-card {
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #f0f0f0;
            transition: 0.4s;
        }
        .rect-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .preview-box { height: 180px; background: #f8f9fa; }
        .card-info { padding: 15px; }

        @media (max-width: 768px) {
            .hello-text { font-size: 3rem; }
            .filter-bar { flex-direction: column; gap: 20px; }
        }
    </style>
</head>
<body>

    <nav class="dynamic-island">
        <a href="index.html" class="island-link">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-7H9v7H5a2 2 0 0 1-2-2z"/></svg>
            <span>Home</span>
        </a>
        <div style="width: 1px; height: 18px; background: rgba(0,0,0,0.1);"></div>
        <a href="applications.html" class="island-link">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            <span>Applications</span>
        </a>
    </nav>

    <header class="header-bg">
        <h1 class="hello-text">Hello, Khalil</h1>

        <div class="search-container">
            <input type="text" placeholder="Search files, student names or teachers...">
        </div>

        <div class="category-scroller">
            <div class="cat-item"><div class="cat-circle">👨‍🎓</div><span>Students</span></div>
            <div class="cat-item"><div class="cat-circle">👩‍🏫</div><span>Teachers</span></div>
            <div class="cat-item"><div class="cat-circle">📄</div><span>Exams</span></div>
        </div>
    </header>

    <div class="filter-bar">
        <h3 style="font-size: 1.5rem; font-weight: 700;">Recents</h3>
        <div class="filter-group">
            <button class="pill-btn">Owner <span>⌄</span></button>
            <button class="pill-btn">Any type <span>⌄</span></button>
            <div class="icon-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 16V4M7 4L3 8M7 4L11 8M17 8v12M17 20l-4-4M17 20l4-4"/></svg>
            </div>
            <div class="icon-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            </div>
        </div>
    </div>

    <main class="recents-section">
        <div class="projects-grid">
            <div class="rect-card">
                <div class="preview-box"></div>
                <div class="card-info">
                    <h4>Student Conduct Record</h4>
                    <p style="color:#86868b; font-size:0.8rem;">Edited 2 days ago</p>
                </div>
            </div>
            </div>
    </main>

</body>
</html>
</html>
