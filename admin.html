<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korahey Admin | Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --island-bg: rgba(0, 0, 0, 0.85);
            --card-glass: rgba(255, 255, 255, 0.7);
            --text-main: #1d1d1f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
            background-color: var(--apple-bg);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 🏝️ PREMIUM DYNAMIC ISLAND */
        .dynamic-island {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--island-bg);
            backdrop-filter: blur(30px) saturate(180%);
            border-radius: 50px;
            padding: 10px 35px;
            display: flex;
            align-items: center;
            gap: 40px;
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .island-icon {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.3s;
            opacity: 0.8;
        }

        .island-icon:hover { opacity: 1; transform: scale(1.05); }

        .island-icon svg { width: 20px; height: 20px; stroke: #fff; fill: none; stroke-width: 2; }
        .island-icon span { color: #fff; font-size: 13px; font-weight: 500; letter-spacing: -0.2px; }

        /* 🍎 MAIN CONTENT */
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 160px 40px 100px;
        }

        /* 🌈 MASSIVE GRADIENT HEADER */
        .welcome-header {
            text-align: center;
            margin-bottom: 80px;
        }

        .hello-text {
            font-size: 8rem; /* Massive scale */
            font-weight: 800;
            letter-spacing: -5px;
            margin-bottom: 0;
            background: linear-gradient(120deg, #1d1d1f, #0071e3, #1d1d1f, #ff3b30, #1d1d1f);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 10s linear infinite;
            line-height: 1;
        }

        @keyframes shine {
            to { background-position: 300% center; }
        }

        /* 🔍 CENTERED SEARCH BAR */
        .search-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 80px;
        }

        .apple-search {
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 18px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .apple-search:focus-within {
            transform: scale(1.02);
            background: #fff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        .apple-search input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 18px;
            font-weight: 400;
            color: var(--text-main);
        }

        /* 🗂️ AMAZING PROJECT CARDS */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 30px;
        }

        .apple-card {
            background: var(--card-glass);
            backdrop-filter: blur(25px);
            border-radius: 35px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .apple-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            background: #fff;
        }

        .card-icon {
            width: 60px;
            height: 60px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
        }

        /* Card specific gradients */
        .icon-exam { background: linear-gradient(135deg, #ff9f0a, #ff3b30); }
        .icon-schedule { background: linear-gradient(135deg, #0071e3, #5ac8fa); }
        .icon-material { background: linear-gradient(135deg, #34c759, #30d158); }

        .apple-card h3 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
        .apple-card p { color: #86868b; font-size: 15px; font-weight: 500; }

        @media (max-width: 768px) {
            .hello-text { font-size: 4rem; letter-spacing: -2px; }
            .dynamic-island { gap: 15px; padding: 8px 20px; width: 95%; }
            .island-icon span { display: none; }
        }
    </style>
</head>
<body>

    <div id="adminContent">
        <div class="dynamic-island">
            <div class="island-icon" id="homeBtn">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-7H9v7H5a2 2 0 0 1-2-2z"/></svg>
                <span>Home</span>
            </div>
            <div class="island-icon" id="createBtn">
                <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
                <span>New</span>
            </div>
            <div class="island-icon" id="profileBtn">
                <img id="adminAvatar" src="default-avatar.png" style="width:24px; height:24px; border-radius:50%; border: 1px solid #fff;">
                <span>Account</span>
            </div>
        </div>

        <div class="admin-container">
            <div class="welcome-header">
                <h1 class="hello-text">Hello, <span id="adminName">Khalil</span></h1>
            </div>

            <div class="search-wrapper">
                <div class="apple-search">
                    <svg width="20" height="20" viewBox="0 0 24 24" stroke="#86868b" fill="none" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="searchInput" placeholder="Search files, exams, or students...">
                </div>
            </div>

            <div class="projects-grid" id="projectsGrid">
                
                <div class="apple-card">
                    <div class="card-icon icon-exam">
                        <svg width="30" height="30" viewBox="0 0 24 24" stroke="#fff" fill="none" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="M8 9h8M8 13h4"/></svg>
                    </div>
                    <h3>Final Exams</h3>
                    <p>Modified 2 hours ago</p>
                </div>

                <div class="apple-card">
                    <div class="card-icon icon-schedule">
                        <svg width="30" height="30" viewBox="0 0 24 24" stroke="#fff" fill="none" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
                    </div>
                    <h3>Class Schedule</h3>
                    <p>Spring Semester 2026</p>
                </div>

                <div class="apple-card">
                    <div class="card-icon icon-material">
                        <svg width="30" height="30" viewBox="0 0 24 24" stroke="#fff" fill="none" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                    </div>
                    <h3>Course Resources</h3>
                    <p>42 Files uploaded</p>
                </div>

            </div>
        </div>
    </div>

    </script>
</body>
</html>
