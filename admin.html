<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korahey Admin | Dashboard</title>
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --text-main: #1d1d1f;
            --apple-blue: #0071e3;
            --island-transparent: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--apple-bg);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* 🏝️ TRANSPARENT DYNAMIC ISLAND */
        .dynamic-island {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--island-transparent);
            backdrop-filter: blur(25px) saturate(180%);
            border-radius: 50px;
            padding: 10px 30px;
            display: flex;
            align-items: center;
            gap: 25px;
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .island-link {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            transition: 0.3s;
        }

        .island-link:hover { transform: scale(1.05); }

        .island-link svg { width: 20px; height: 20px; stroke: #fff; stroke-width: 2; fill: none; }

        /* 🏔️ HEADER SECTION */
        .admin-header {
            padding: 140px 5% 40px;
            text-align: center;
            background: #000; /* Dark background to make white/blue gradient pop */
            border-radius: 0 0 60px 60px; /* Soft bottom edges */
            margin-bottom: 60px;
        }

        .hello-text {
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: -3px;
            margin-bottom: 40px;
            /* 🌈 WHITE & BLUE GRADIENT */
            background: linear-gradient(to right, #ffffff 30%, var(--apple-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 🔍 SOFT EDGES SEARCH BAR */
        .search-container {
            max-width: 700px;
            margin: 0 auto;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 20px 30px 20px 65px;
            border-radius: 40px; /* Extra soft edges */
            border: none;
            font-size: 1.1rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: #fff;
            outline: none;
            transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .search-container input:focus {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.3);
        }

        .search-container input::placeholder { color: rgba(255, 255, 255, 0.5); }

        .search-icon {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.6;
        }

        /* 🔘 CATEGORY SCROLLER */
        .category-scroller {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 50px;
        }

        .cat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .cat-circle {
            width: 60px;
            height: 60px;
            border-radius: 20px; /* Soft rounded square */
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .cat-item:hover .cat-circle {
            background: var(--apple-blue);
            transform: translateY(-5px);
        }

        .cat-item span { color: #fff; font-size: 12px; font-weight: 500; opacity: 0.7; }

        /* 🖼️ RECENTS SECTION */
        .recents-section { padding: 0 8% 100px; }
        .section-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 30px; color: var(--text-main); }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .rect-card {
            background: #fff;
            border-radius: 24px; /* Soft edges */
            overflow: hidden;
            transition: 0.4s;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }

        .rect-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.06); }

        .preview-box { height: 180px; background: #eef2f6; }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; }

        .card-info { padding: 20px; }
        .card-info h4 { font-size: 1rem; font-weight: 600; margin-bottom: 5px; }
        .card-info p { font-size: 0.85rem; color: #86868b; }

        @media (max-width: 768px) {
            .hello-text { font-size: 3rem; }
            .category-scroller { overflow-x: auto; justify-content: flex-start; padding-bottom: 10px; }
        }
    </style>
</head>
<body>

    <nav class="dynamic-island">
        <a href="index.html" class="island-link">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-5v-7H9v7H5a2 2 0 0 1-2-2z"/></svg>
            <span>Home</span>
        </a>
        <div style="width: 1px; height: 20px; background: rgba(255,255,255,0.2);"></div>
        <a href="applications.html" class="island-link">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            <span>Applications</span>
        </a>
    </nav>

    <header class="admin-header">
        <h1 class="hello-text">Hello, Khalil</h1>

        <div class="search-container">
            <span class="search-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </span>
            <input type="text" placeholder="Search applications, records or files...">
        </div>

        <div class="category-scroller">
            <div class="cat-item">
                <div class="cat-circle">👨‍🎓</div>
                <span>Students</span>
            </div>
            <div class="cat-item">
                <div class="cat-circle">👩‍🏫</div>
                <span>Teachers</span>
            </div>
            <div class="cat-item">
                <div class="cat-circle">📑</div>
                <span>Reports</span>
            </div>
        </div>
    </header>

    <main class="recents-section">
        <h3 class="section-title">Recent Activity</h3>
        <div class="projects-grid">
            <div class="rect-card">
                <div class="preview-box"><img src="slided1.png"></div>
                <div class="card-info">
                    <h4>Student Enrollment List</h4>
                    <p>Modified 10 mins ago</p>
                </div>
            </div>
            <div class="rect-card">
                <div class="preview-box"><img src="slided2.png"></div>
                <div class="card-info">
                    <h4>Teacher Application Review</h4>
                    <p>Modified 2 hours ago</p>
                </div>
            </div>
            <div class="rect-card">
                <div class="preview-box"><img src="slided3.png"></div>
                <div class="card-info">
                    <h4>Exam Results 2026</h4>
                    <p>Modified yesterday</p>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
