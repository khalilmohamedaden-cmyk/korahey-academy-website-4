<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korahey Academy | Admin Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --glass-border: rgba(255, 255, 255, 0.05);
            --text-dim: rgba(255, 255, 255, 0.6);
            --card-bg: #0c0c0c;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 120px 8% 60px;
        }
        
        .admin-header {
            margin-bottom: 50px;
        }
        
        .admin-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffa500, #ff6b00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .admin-header p {
            color: var(--text-dim);
            margin-top: 10px;
        }
        
        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }
        
        .admin-card {
            background: rgba(20,20,20,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 30px;
            transition: all 0.3s ease;
        }
        
        .admin-card:hover {
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-5px);
        }
        
        .admin-card h3 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .user-info {
            display: flex;
            flex-direction: column;
        }
        
        .user-email {
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .user-name {
            font-size: 0.7rem;
            color: var(--text-dim);
        }
        
        .admin-badge {
            background: rgba(255,100,0,0.2);
            color: #ffa500;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 20px;
        }
        
        .make-admin-btn {
            background: rgba(255,100,0,0.15);
            border: 1px solid rgba(255,100,0,0.3);
            color: #ffa500;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.3s;
        }
        
        .make-admin-btn:hover {
            background: rgba(255,100,0,0.3);
        }
        
        .add-admin-section {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        
        .add-admin-section input {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: #fff;
        }
        
        .add-admin-section button {
            padding: 12px 20px;
            background: #ffa500;
            border: none;
            border-radius: 16px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
        }
        
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 24px;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            color: #fff;
            text-decoration: none;
            cursor: pointer;
        }
        
        .warning-message {
            text-align: center;
            padding: 60px;
            color: var(--text-dim);
        }
        
        .stats-numbers {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 20px;
        }
        
        .stat-box {
            text-align: center;
            flex: 1;
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: 800;
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

    <div class="admin-container" id="adminContainer" style="display: none;">
        <div class="admin-header">
            <h1>Admin Dashboard</h1>
            <p>Manage users, content, and site settings</p>
        </div>
        
        <div class="admin-grid">
            <!-- User Management Card -->
            <div class="admin-card">
                <h3>👥 User Management</h3>
                <div class="stats-numbers">
                    <div class="stat-box">
                        <div class="stat-number" id="totalUsers">0</div>
                        <div class="stat-label">Total Users</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="totalAdmins">0</div>
                        <div class="stat-label">Admins</div>
                    </div>
                </div>
            </div>
            
            <!-- Add Admin Card -->
            <div class="admin-card">
                <h3>➕ Add New Admin</h3>
                <p style="font-size: 0.85rem; color: var(--text-dim); margin-bottom: 15px;">Enter email address to grant admin privileges</p>
                <div class="add-admin-section">
                    <input type="email" id="newAdminEmail" placeholder="admin@example.com">
                    <button onclick="addAdmin()">Add Admin</button>
                </div>
            </div>
        </div>
        
        <!-- Users List -->
        <div class="admin-card">
            <h3>📋 All Users</h3>
            <div class="user-list" id="usersList">
                <!-- Users will be loaded here -->
            </div>
        </div>
        
        <button class="back-btn" onclick="goBack()">← Back to Home</button>
    </div>
    
    <div class="warning-message" id="warningMessage">
        <h2>Access Denied</h2>
        <p>You don't have permission to view this page.</p>
        <button class="back-btn" onclick="goBack()" style="margin-top: 20px;">Back to Home</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCC5oK1cMufciR1v4wLi-jfYvXa_cQBnd0",
            authDomain: "korahey-admin.firebaseapp.com",
            projectId: "korahey-admin",
            storageBucket: "korahey-admin.firebasestorage.app",
            messagingSenderId: "86298888884",
            appId: "1:86298888884:web:f1d835de1cb9d2534d65e1"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const ADMIN_EMAIL = "khalilmohamedaden@gmail.com";
        const adminContainer = document.getElementById('adminContainer');
        const warningMessage = document.getElementById('warningMessage');

        async function checkAdminAccess(user) {
            if (!user) {
                showAccessDenied();
                return false;
            }
            
            // Check if user is super admin
            if (user.email === ADMIN_EMAIL) {
                adminContainer.style.display = 'block';
                warningMessage.style.display = 'none';
                loadAdminData();
                return true;
            }
            
            // Check Firestore for admin status
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (userDoc.exists && userDoc.data().isAdmin === true) {
                adminContainer.style.display = 'block';
                warningMessage.style.display = 'none';
                loadAdminData();
                return true;
            }
            
            showAccessDenied();
            return false;
        }
        
        function showAccessDenied() {
            adminContainer.style.display = 'none';
            warningMessage.style.display = 'block';
        }
        
        async function loadAdminData() {
            await loadUsers();
        }
        
        async function loadUsers() {
            const usersSnapshot = await db.collection('users').get();
            const users = [];
            let adminCount = 0;
            
            usersSnapshot.forEach(doc => {
                const userData = doc.data();
                users.push({ id: doc.id, ...userData });
                if (userData.isAdmin === true) adminCount++;
            });
            
            document.getElementById('totalUsers').textContent = users.length;
            document.getElementById('totalAdmins').textContent = adminCount;
            
            const usersList = document.getElementById('usersList');
            usersList.innerHTML = users.map(user => `
                <div class="user-item">
                    <div class="user-info">
                        <span class="user-email">${user.email}</span>
                        <span class="user-name">${user.name || 'No name'}</span>
                    </div>
                    <div>
                        ${user.isAdmin ? 
                            '<span class="admin-badge">ADMIN</span>' : 
                            `<button class="make-admin-btn" onclick="makeAdmin('${user.id}', '${user.email}')">Make Admin</button>`
                        }
                    </div>
                </div>
            `).join('');
        }
        
        async function makeAdmin(userId, userEmail) {
            if (!confirm(`Grant admin privileges to ${userEmail}?`)) return;
            
            try {
                await db.collection('users').doc(userId).update({
                    isAdmin: true,
                    role: 'admin',
                    grantedBy: auth.currentUser?.email,
                    grantedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert(`${userEmail} is now an admin!`);
                loadUsers();
            } catch (error) {
                console.error('Error making admin:', error);
                alert('Error: ' + error.message);
            }
        }
        
        async function addAdmin() {
            const email = document.getElementById('newAdminEmail').value;
            if (!email) {
                alert('Please enter an email address');
                return;
            }
            
            // Find user by email
            const usersSnapshot = await db.collection('users').where('email', '==', email).get();
            
            if (usersSnapshot.empty) {
                alert('User not found. They need to sign up first!');
                return;
            }
            
            usersSnapshot.forEach(async (doc) => {
                await db.collection('users').doc(doc.id).update({
                    isAdmin: true,
                    role: 'admin',
                    grantedBy: auth.currentUser?.email,
                    grantedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert(`${email} is now an admin!`);
                loadUsers();
                document.getElementById('newAdminEmail').value = '';
            });
        }
        
        function goBack() {
            window.location.href = 'index.html';
        }
        
        auth.onAuthStateChanged((user) => {
            if (user) {
                checkAdminAccess(user);
            } else {
                showAccessDenied();
            }
        });
    </script>
</body>
</html>
</html>
