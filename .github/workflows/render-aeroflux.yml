name: Render AEROFLUX Video

on:
  push:
    branches:
      - claude/eager-pasteur-jte0qt
    paths:
      - 'aeroflux-video/**'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: aeroflux-video/package-lock.json

      - name: Install dependencies
        working-directory: aeroflux-video
        run: npm ci

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgbm-dev \
            libasound2-dev \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgdk-pixbuf2.0-0 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libxss1 \
            libxtst6 \
            xvfb

      - name: Render video
        working-directory: aeroflux-video
        run: |
          mkdir -p out
          npx remotion render src/index.ts AerofluxComposition out/aeroflux.mp4 --log=verbose

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: aeroflux-video
          path: aeroflux-video/out/aeroflux.mp4
          retention-days: 7
