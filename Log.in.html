<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korahey Academy | Log In</title>
    <style>
        :root {
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-dim: rgba(255, 255, 255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        /* Page Transition Overlay */
        .page-transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .page-transition.active {
            opacity: 1;
            visibility: visible;
        }

        .school-name-animation {
            text-align: center;
            transform: scale(0.8);
            opacity: 0;
            animation: popIn 0.6s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
        }

        @keyframes popIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .school-name-animation h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #fff 0%, #888 50%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .school-name-animation .tagline {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 2px;
            font-weight: 500;
        }

        .split-container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* LEFT SIDE - Log In Form (Centered) */
        .left-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            z-index: 10;
            position: relative;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 50px 40px;
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .login-header { 
            text-align: center; 
            margin-bottom: 35px; 
        }
        .login-header h1 { 
            font-size: 2.5rem; 
            font-weight: 700; 
            letter-spacing: -1px; 
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #999 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-header p { 
            color: var(--text-dim); 
            font-size: 0.9rem; 
        }

        .input-group { 
            margin-bottom: 20px; 
        }
        .input-group label { 
            display: block; 
            font-size: 0.8rem; 
            margin-bottom: 8px; 
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.5px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: #fff;
            font-size: 1rem;
            transition: 0.3s;
        }
        .input-group input:focus { 
            outline: none; 
            border-color: rgba(255,255,255,0.4); 
            background: rgba(255, 255, 255, 0.08); 
        }
        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #fff;
            border: none;
            border-radius: 100px;
            font-size: 1rem;
            font-weight: 600;
            color: #000;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .login-btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 25px -5px rgba(255,255,255,0.2); 
        }

        .divider { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            margin: 25px 0; 
            color: var(--text-dim); 
            font-size: 0.8rem; 
        }
        .divider::before, .divider::after { 
            content: ''; 
            flex: 1; 
            height: 1px; 
            background: rgba(255, 255, 255, 0.1); 
        }

        .google-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            color: #fff;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }
        .google-btn:hover { 
            background: rgba(255,255,255,0.05); 
            border-color: rgba(255,255,255,0.2);
        }

        .signup-link {
            text-align: center;
            margin-top: 30px;
            color: var(--text-dim);
            font-size: 0.9rem;
        }
        .signup-link a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .signup-link a:hover {
            text-decoration: underline;
        }

        /* RIGHT SIDE - Beautiful Moving Images */
        .right-side {
            flex: 1.1;
            display: flex;
            gap: 20px;
            padding: 30px;
            background: #000;
            overflow: hidden;
            position: relative;
        }

        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-radius: 24px;
        }

        .move-up { 
            animation: scrollUp 20s linear infinite; 
        }
        .move-down { 
            animation: scrollDown 20s linear infinite; 
        }

        @keyframes scrollUp {
            0% { transform: translateY(0); }
            100% { transform: translateY(-30%); }
        }

        @keyframes scrollDown {
            0% { transform: translateY(-30%); }
            100% { transform: translateY(0); }
        }

        .column img {
            width: 100%;
            height: 380px;
            object-fit: cover;
            border-radius: 28px;
            opacity: 0.4;
            transition: all 0.5s ease;
            filter: grayscale(30%);
        }

        .column img:hover { 
            opacity: 0.85; 
            filter: grayscale(0%);
            transform: scale(1.02);
        }

        .right-side::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(to bottom, #000, transparent);
            z-index: 5;
            pointer-events: none;
        }
        .right-side::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(to top, #000, transparent);
            z-index: 5;
            pointer-events: none;
        }

        @media (max-width: 900px) {
            .right-side { display: none; }
            .left-side { flex: 1; }
            .login-card { margin: 20px; max-width: 100%; }
        }
    </style>
</head>
<body>

    <!-- Page Transition Overlay -->
    <div class="page-transition" id="pageTransition">
        <div class="school-name-animation">
            <h1>KORAHEY ACADEMY</h1>
            <div class="tagline">Passion for Success</div>
        </div>
    </div>

    <div class="split-container">
        <!-- LEFT SIDE: Log In Form -->
        <div class="left-side">
            <div class="login-card">
                <div class="login-header">
                    <h1>Welcome Back</h1>
                    <p>Enter your details to access your portal</p>
                </div>
                <form onsubmit="event.preventDefault(); alert('Logged in successfully! Redirecting to home...'); window.location.href='index.html';">
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="student@korahey.com" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="login-btn">Log In</button>
                </form>
                <div class="divider">OR</div>
                <button class="google-btn" onclick="alert('Google Login coming soon!')">
                    <svg width="18" height="18" viewBox="0 0 24 24">
                        <path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                </button>
                <div class="signup-link">
                    Don't have an account? <a id="signupLink">Sign Up</a>
                </div>
            </div>
        </div>

        <!-- RIGHT SIDE: Animated Images -->
        <div class="right-side">
            <div class="column move-up">
                <img src="slided1.png" alt="">
                <img src="slided2.png" alt="">
                <img src="slided3.png" alt="">
                <img src="slided4.png" alt="">
                <img src="slided1.png" alt="">
                <img src="slided2.png" alt="">
                <img src="slided3.png" alt="">
            </div>
            <div class="column move-down">
                <img src="slided5.png" alt="">
                <img src="slided6.png" alt="">
                <img src="slided7.png" alt="">
                <img src="slided8.png" alt="">
                <img src="slided5.png" alt="">
                <img src="slided6.png" alt="">
                <img src="slided7.png" alt="">
            </div>
        </div>
    </div>

    <script>
        const transitionOverlay = document.getElementById('pageTransition');
        
        function navigateWithAnimation(url) {
            transitionOverlay.classList.add('active');
            setTimeout(() => {
                window.location.href = url;
            }, 600);
        }

        document.getElementById('signupLink').addEventListener('click', function(e) {
            e.preventDefault();
            navigateWithAnimation('Sign.up.html');
        });

        // Entrance animation when page loads
        transitionOverlay.classList.add('active');
        setTimeout(() => {
            transitionOverlay.classList.remove('active');
        }, 800);
    </script>
</body>
</html>
