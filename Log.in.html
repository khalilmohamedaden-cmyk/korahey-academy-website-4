<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korahey Academy | Log In</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --glass-border:rgba(255,255,255,0.08); --text-dim:rgba(255,255,255,0.5); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif; background:#000; color:#fff; overflow:hidden; height:100vh; }
        .split-container { display:flex; width:100%; height:100vh; }
        .left-side { flex:1; display:flex; align-items:center; justify-content:center; background:#000; z-index:10; }
        .login-card { width:100%; max-width:420px; padding:50px 40px; background:rgba(15,15,15,0.6); backdrop-filter:blur(20px); border:1px solid var(--glass-border); border-radius:40px; }
        .login-header { text-align:center; margin-bottom:35px; }
        .login-header h1 { font-size:2.5rem; font-weight:700; letter-spacing:-1px; background:linear-gradient(135deg,#fff 0%,#999 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .login-header p { color:var(--text-dim); font-size:0.9rem; }
        .input-group { margin-bottom:20px; }
        .input-group label { display:block; font-size:0.8rem; margin-bottom:8px; color:rgba(255,255,255,0.7); }
        .input-group input { width:100%; padding:14px 18px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:16px; color:#fff; font-size:1rem; }
        .input-group input:focus { outline:none; border-color:rgba(255,255,255,0.4); }
        .login-btn { width:100%; padding:14px; background:#fff; border:none; border-radius:100px; font-weight:600; cursor:pointer; margin-top:10px; color:#000; font-size:1rem; }
        .login-btn:disabled { opacity:0.5; cursor:not-allowed; }
        .divider { display:flex; align-items:center; gap:15px; margin:25px 0; color:var(--text-dim); }
        .divider::before,.divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.1); }
        .google-btn { width:100%; padding:12px; background:transparent; border:1px solid var(--glass-border); border-radius:100px; color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; }
        .signup-link { text-align:center; margin-top:30px; color:var(--text-dim); }
        .signup-link a { color:#fff; text-decoration:none; font-weight:600; cursor:pointer; }
        .forgot-password { text-align:right; margin-bottom:20px; }
        .forgot-password a { color:var(--text-dim); font-size:0.8rem; text-decoration:none; cursor:pointer; }
        .right-side { flex:1.1; display:flex; gap:20px; padding:30px; background:#000; overflow:hidden; position:relative; }
        .column { flex:1; display:flex; flex-direction:column; gap:20px; }
        .move-up { animation:scrollUp 20s linear infinite; }
        .move-down { animation:scrollDown 20s linear infinite; }
        @keyframes scrollUp { 0%{transform:translateY(0);} 100%{transform:translateY(-30%);} }
        @keyframes scrollDown { 0%{transform:translateY(-30%);} 100%{transform:translateY(0);} }
        .column img { width:100%; height:380px; object-fit:cover; border-radius:28px; opacity:0.4; transition:all 0.4s ease; cursor:pointer; }
        .column img:hover { opacity:1; transform:scale(1.02); }
        .right-side::before,.right-side::after { content:''; position:absolute; left:0; width:100%; height:100px; pointer-events:none; }
        .right-side::before { top:0; background:linear-gradient(to bottom,#000,transparent); }
        .right-side::after { bottom:0; background:linear-gradient(to top,#000,transparent); }
        @media(max-width:900px){ .right-side{display:none;} }
        .page-transition { position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; align-items:center; justify-content:center; opacity:1; visibility:visible; transition:opacity 0.5s ease,visibility 0.5s ease; }
        .page-transition.fade-out { opacity:0; visibility:hidden; }
        .school-name-animation { text-align:center; transform:scale(0.8); opacity:0; animation:popIn 0.6s cubic-bezier(0.34,1.2,0.64,1) forwards; }
        @keyframes popIn { 0%{transform:scale(0.5);opacity:0;} 100%{transform:scale(1);opacity:1;} }
        .school-name-animation h1 { font-size:3rem; font-weight:800; letter-spacing:-2px; background:linear-gradient(135deg,#fff 0%,#888 50%,#fff 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:15px; }
        .school-name-animation .tagline { font-size:0.9rem; color:rgba(255,255,255,0.5); letter-spacing:2px; font-weight:500; }
        .error-message { color:#ff6b6b; font-size:0.8rem; margin-top:5px; display:none; text-align:center; padding:10px; background:rgba(255,0,0,0.1); border-radius:10px; }
        /* admin redirect banner */
        .admin-banner { background:rgba(0,113,227,0.12); border:1px solid rgba(0,113,227,0.25); border-radius:14px; padding:10px 16px; margin-bottom:20px; font-size:0.82rem; color:rgba(255,255,255,0.7); text-align:center; display:none; }
    </style>
</head>
<body>
    <div class="page-transition" id="pageTransition">
        <div class="school-name-animation">
            <h1>KORAHEY ACADEMY</h1>
            <div class="tagline">Passion for Success</div>
        </div>
    </div>

    <div class="split-container">
        <div class="left-side">
            <div class="login-card">
                <div class="login-header">
                    <h1>Welcome Back</h1>
                    <p>Enter your details to access your portal</p>
                </div>
                <!-- shown when coming from admin -->
                <div class="admin-banner" id="adminBanner">
                    🔒 Sign in to continue to the Admin Dashboard
                </div>
                <div id="errorMessage" class="error-message"></div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="student@korahey.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password">
                </div>
                <div class="forgot-password"><a id="forgotPassword">Forgot Password?</a></div>
                <button class="login-btn" id="loginBtn">Log In</button>
                <div class="divider">OR</div>
                <button class="google-btn" id="googleBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24">
                        <path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                </button>
                <div class="signup-link">Don't have an account? <a id="signupLink">Sign Up</a></div>
            </div>
        </div>
        <div class="right-side">
            <div class="column move-up">
                <img src="slided1.png" alt=""><img src="slided2.png" alt=""><img src="slided3.png" alt="">
                <img src="slided4.png" alt=""><img src="slided1.png" alt=""><img src="slided2.png" alt="">
            </div>
            <div class="column move-down">
                <img src="slided5.png" alt=""><img src="slided6.png" alt=""><img src="slided7.png" alt="">
                <img src="slided8.png" alt=""><img src="slided5.png" alt=""><img src="slided6.png" alt="">
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const firebaseConfig = {
                apiKey: "AIzaSyCC5oK1cMufciR1v4wLi-jfYvXa_cQBnd0",
                authDomain: "korahey-admin.firebaseapp.com",
                projectId: "korahey-admin",
                storageBucket: "korahey-admin.firebasestorage.app",
                messagingSenderId: "86298888884",
                appId: "1:86298888884:web:f1d835de1cb9d2534d65e1"
            };
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.firestore();

            // ── READ REDIRECT PARAM ──
            // e.g. Log.in.html?redirect=admin.html
            const urlParams = new URLSearchParams(window.location.search);
            const redirectTo = urlParams.get('redirect') || 'index.html';

            // Show admin banner if coming from admin
            if (redirectTo === 'admin.html') {
                document.getElementById('adminBanner').style.display = 'block';
            }

            db.enablePersistence().catch(() => {});

            const googleProvider = new firebase.auth.GoogleAuthProvider();
            const loginBtn      = document.getElementById('loginBtn');
            const googleBtn     = document.getElementById('googleBtn');
            const signupLink    = document.getElementById('signupLink');
            const forgotLink    = document.getElementById('forgotPassword');
            const emailInput    = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const errorDiv      = document.getElementById('errorMessage');

            function showError(msg) {
                errorDiv.textContent = msg;
                errorDiv.style.display = 'block';
                setTimeout(() => { errorDiv.style.display = 'none'; }, 5000);
            }
            function setLoading(loading) {
                loginBtn.disabled = loading;
                loginBtn.textContent = loading ? 'Logging in…' : 'Log In';
            }

            async function signInWithEmail() {
                const email    = emailInput.value.trim();
                const password = passwordInput.value;
                if (!email || !password) { showError('Please enter email and password'); return; }
                setLoading(true);
                try {
                    const { user } = await auth.signInWithEmailAndPassword(email, password);
                    try {
                        const doc = await db.collection('users').doc(user.uid).get();
                        if (doc.exists && doc.data().isBanned) {
                            await auth.signOut();
                            showError('Your account has been banned. Contact support.');
                            setLoading(false);
                            return;
                        }
                        db.collection('users').doc(user.uid).update({ lastLogin: new Date().toISOString() }).catch(() => {});
                    } catch(e) { /* offline — continue */ }
                    window.location.href = redirectTo;
                } catch(e) {
                    const msgs = { 'auth/user-not-found':'No account found with this email.', 'auth/wrong-password':'Incorrect password.', 'auth/invalid-email':'Invalid email format.', 'auth/invalid-credential':'Incorrect email or password.' };
                    showError(msgs[e.code] || e.message);
                } finally { setLoading(false); }
            }

            async function signInWithGoogle() {
                setLoading(true);
                try {
                    const { user } = await auth.signInWithPopup(googleProvider);
                    try {
                        const doc = await db.collection('users').doc(user.uid).get();
                        if (doc.exists && doc.data().isBanned) {
                            await auth.signOut();
                            showError('Your account has been banned. Contact support.');
                            setLoading(false);
                            return;
                        }
                        if (!doc.exists) {
                            await db.collection('users').doc(user.uid).set({
                                email: user.email, name: user.displayName || user.email.split('@')[0],
                                isAdmin: user.email === 'khalilmohamedaden@gmail.com',
                                isBanned: false, createdAt: new Date().toISOString(), lastLogin: new Date().toISOString()
                            });
                        } else {
                            db.collection('users').doc(user.uid).update({ lastLogin: new Date().toISOString() }).catch(() => {});
                        }
                    } catch(e) { /* offline — continue */ }
                    window.location.href = redirectTo;
                } catch(e) {
                    showError(e.message);
                } finally { setLoading(false); }
            }

            async function resetPassword() {
                const email = emailInput.value.trim();
                if (!email) { showError('Enter your email first'); return; }
                try {
                    await auth.sendPasswordResetEmail(email);
                    showError('Password reset email sent! Check your inbox.');
                } catch(e) { showError(e.message); }
            }

            loginBtn.addEventListener('click', signInWithEmail);
            googleBtn.addEventListener('click', signInWithGoogle);
            signupLink.addEventListener('click', () => { window.location.href = 'Sign.up.html'; });
            forgotLink.addEventListener('click', resetPassword);
            passwordInput.addEventListener('keypress', e => { if(e.key==='Enter') signInWithEmail(); });
            emailInput.addEventListener('keypress',    e => { if(e.key==='Enter') signInWithEmail(); });

            setTimeout(() => {
                document.getElementById('pageTransition').classList.add('fade-out');
            }, 800);
        });
    </script>
</body>
</html>
